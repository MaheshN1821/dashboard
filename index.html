<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta
			name="description"
			content="Finance Dashboard - Track and understand your financial activity"
		/>
		<title>Finly - Finance Dashboard</title>

		<!--
      Inline script to prevent flash of wrong theme on load.
      Reads from localStorage before React hydrates — this is the
      standard pattern for avoiding FOUC with class-based dark mode.
    -->
		<script>
			(function () {
				try {
					const stored = localStorage.getItem("finly-theme");
					const prefersDark = window.matchMedia(
						"(prefers-color-scheme: dark)",
					).matches;
					if (stored === "dark" || (!stored && prefersDark)) {
						document.documentElement.classList.add("dark");
					}
				} catch (e) {
					// localStorage might be blocked in some environments - ignore
				}
			})();
		</script>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.jsx"></script>
	</body>
</html>
